name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # 1. Python 后端测试
  # ============================================================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('server/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pytest fakeredis -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Run tests
        run: |
          cd tests
          python -m pytest test_approval_service.py test_token_lock.py test_wecom_crypto.py test_api_pytest.py -v --tb=short

  # ============================================================
  # 2. 前端构建验证
  # ============================================================
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('client/package-lock.json', 'client/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Build
        run: |
          cd client
          npm run build

  # ============================================================
  # 3. CodeQL 代码安全扫描
  # ============================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================================
  # 4. Docker 镜像构建并推送到 GHCR（仅 main/master 分支 push 时触发）
  # ============================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test-python, test-frontend, codeql]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Flask image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-rag-server:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-rag-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-rag-client:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-rag-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
